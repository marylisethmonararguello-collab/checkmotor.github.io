<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>

body{
background:#f3f4f7;
font-family:Arial;
}

.navbar{
background:#2c3e50;
}

.card{
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.15);
}

.product-img{
height:180px;
object-fit:cover;
}

.login-box{
max-width:420px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:10px;
}

.hidden{
display:none;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:150px;
background:white;
padding:15px;
border-radius:8px;
text-align:center;
box-shadow:0 3px 6px rgba(0,0,0,.1);
}

.lowStock{
border:2px solid red;
}

</style>

</head>

<body>


<nav class="navbar navbar-dark">
<div class="container">

<span class="navbar-brand">
<i class="fa fa-box"></i> Inventario
</span>

<div>

<span id="userEmail" class="text-white me-3"></span>

<button class="btn btn-light btn-sm" id="logoutBtn">
Salir
</button>

</div>

</div>
</nav>


<div id="loginSection" class="login-box">

<h4 class="text-center mb-3">Acceso</h4>

<form id="loginForm">

<input class="form-control mb-2" id="email" placeholder="Email" required>

<input class="form-control mb-3" id="password" type="password" placeholder="Contraseña" required>

<button class="btn btn-primary w-100">Entrar</button>

</form>

<hr>

<button id="registerBtn" class="btn btn-success w-100">
Crear cuenta
</button>

</div>


<div id="appSection" class="container mt-4 hidden">

<div class="stats">

<div class="stat">
<h5 id="statProducts">0</h5>
Productos
</div>

<div class="stat">
<h5 id="statUnits">0</h5>
Unidades
</div>

<div class="stat">
<h5 id="statValue">$0</h5>
Valor inventario
</div>

</div>


<div class="row mb-3">

<div class="col-md-4">

<input id="search" class="form-control" placeholder="Buscar">

</div>

<div class="col-md-3">

<select id="filterCategory" class="form-control"></select>

</div>

<div class="col-md-3">

<select id="sort" class="form-control">
<option value="">Ordenar</option>
<option value="name">Nombre</option>
<option value="qty">Cantidad</option>
<option value="price">Precio</option>
</select>

</div>

<div class="col-md-2">

<button class="btn btn-success w-100" onclick="exportExcel()">
Excel
</button>

</div>

</div>


<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addModal">
Agregar producto
</button>

<div class="row" id="productList"></div>

</div>


<div class="modal fade" id="addModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Producto</h5>
</div>

<div class="modal-body">

<input id="pName" class="form-control mb-2" placeholder="Nombre">

<input id="pPrice" type="number" class="form-control mb-2" placeholder="Precio">

<input id="pQty" type="number" class="form-control mb-2" placeholder="Cantidad">

<input id="pCategory" class="form-control mb-2" placeholder="Categoría">

<input type="file" id="pImg" class="form-control">

</div>

<div class="modal-footer">

<button class="btn btn-primary" id="saveProduct">
Guardar
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCOlWzZG-q_dEVOXcl_VUeJSqyOLjgUspE",
authDomain:"inventario-checkmotor.firebaseapp.com",
projectId:"inventario-checkmotor",
storageBucket:"inventario-checkmotor.appspot.com",
messagingSenderId:"477154912469",
appId:"1:477154912469:web:41eb97c2f847946dd89a5c"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()
const auth=firebase.auth()
const storage=firebase.storage()

let productsRef
let currentUser
let products=[]

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user

productsRef=db.collection("users").doc(user.uid).collection("products")

document.getElementById("loginSection").classList.add("hidden")
document.getElementById("appSection").classList.remove("hidden")

document.getElementById("userEmail").innerText=user.email

listenProducts()

}else{

document.getElementById("loginSection").classList.remove("hidden")
document.getElementById("appSection").classList.add("hidden")

}

})


document.getElementById("loginForm").addEventListener("submit",async e=>{

e.preventDefault()

await auth.signInWithEmailAndPassword(email.value,password.value)

})


document.getElementById("registerBtn").onclick=async()=>{

await auth.createUserWithEmailAndPassword(email.value,password.value)

}


document.getElementById("logoutBtn").onclick=()=>auth.signOut()


function listenProducts(){

productsRef.onSnapshot(snap=>{

products=[]

snap.forEach(doc=>{

products.push({id:doc.id,...doc.data()})

})

render()

})

}


function render(){

let list=document.getElementById("productList")

list.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(search))

filtered.forEach(p=>{

let low=p.quantity<=3?"lowStock":""

list.innerHTML+=`

<div class="col-md-4 mb-3">

<div class="card ${low}">

<img src="${p.image||'https://via.placeholder.com/300'}" class="product-img">

<div class="card-body">

<h5>${p.name}</h5>

Precio $${p.price}<br>

Cantidad ${p.quantity}<br>

Categoría ${p.category||""}

</div>

<div class="card-footer">

<button class="btn btn-danger btn-sm" onclick="del('${p.id}')">
Eliminar
</button>

</div>

</div>

</div>

`

})

updateStats()

}


function updateStats(){

let units=0
let value=0

products.forEach(p=>{

units+=p.quantity
value+=p.quantity*p.price

})

statProducts.innerText=products.length
statUnits.innerText=units
statValue.innerText="$"+value.toFixed(2)

}


saveProduct.onclick=async()=>{

let name=pName.value
let price=parseFloat(pPrice.value)
let qty=parseInt(pQty.value)
let cat=pCategory.value

let img=""

if(pImg.files.length){

let file=pImg.files[0]

let ref=storage.ref("products/"+Date.now())

await ref.put(file)

img=await ref.getDownloadURL()

}

await productsRef.add({
name:name,
price:price,
quantity:qty,
category:cat,
image:img
})

bootstrap.Modal.getInstance(addModal).hide()

}


async function del(id){

if(confirm("Eliminar producto?")){

await productsRef.doc(id).delete()

}

}


search.oninput=render


function exportExcel(){

let csv="Nombre,Precio,Cantidad\n"

products.forEach(p=>{

csv+=`${p.name},${p.price},${p.quantity}\n`

})

let blob=new Blob([csv])
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="inventario.csv"
a.click()

}

</script>

</body>
</html>
