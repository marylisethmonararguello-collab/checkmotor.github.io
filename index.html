<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Inventario</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

<style>

body{
background:#f2f3f7;
font-family:Arial;
}

.hidden{
display:none;
}

.navbar{
background:#2c3e50;
}

.card{
border-radius:10px;
box-shadow:0 3px 6px rgba(0,0,0,.2);
}

.product-img{
height:180px;
object-fit:cover;
}

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
flex:1;
min-width:150px;
background:white;
padding:15px;
border-radius:8px;
text-align:center;
box-shadow:0 3px 6px rgba(0,0,0,.1);
}

.low{
border:2px solid red;
}

.login-box{
max-width:420px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:10px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<span class="navbar-brand">Inventario</span>

<div>

<span id="userEmail" class="text-white me-3"></span>

<button id="logoutBtn" class="btn btn-light btn-sm">
Salir
</button>

</div>

</div>

</nav>


<div id="loginSection" class="login-box">

<h4 class="text-center mb-3">Acceso</h4>

<form id="loginForm">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

<button class="btn btn-primary w-100">
Entrar
</button>

</form>

<hr>

<button id="registerBtn" class="btn btn-success w-100">
Crear cuenta
</button>

</div>


<div id="appSection" class="container mt-4 hidden">

<div class="stats">

<div class="stat">
<h5 id="statProducts">0</h5>
Productos
</div>

<div class="stat">
<h5 id="statUnits">0</h5>
Unidades
</div>

<div class="stat">
<h5 id="statValue">$0</h5>
Valor inventario
</div>

</div>


<div class="row mb-3">

<div class="col-md-3">

<input id="search" class="form-control" placeholder="Buscar">

</div>

<div class="col-md-3">

<select id="filterCategory" class="form-control">
<option value="all">Todas categorías</option>
</select>

</div>

<div class="col-md-3">

<select id="sort" class="form-control">

<option value="">Ordenar</option>
<option value="name">Nombre</option>
<option value="qty">Cantidad</option>
<option value="price">Precio</option>

</select>

</div>

<div class="col-md-3">

<button class="btn btn-success w-100" onclick="exportExcel()">
Exportar Excel
</button>

</div>

</div>


<div class="row mb-3">

<div class="col-md-4">

<input id="newCategory" class="form-control" placeholder="Nueva categoría">

</div>

<div class="col-md-2">

<button class="btn btn-secondary" onclick="addCategory()">
Crear categoría
</button>

</div>

<div class="col-md-6 text-end">

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
Agregar producto
</button>

</div>

</div>


<div class="row" id="productList"></div>

</div>


<div class="modal fade" id="productModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Producto</h5>

</div>

<div class="modal-body">

<input id="pName" class="form-control mb-2" placeholder="Nombre">

<input id="pPrice" type="number" class="form-control mb-2" placeholder="Precio">

<input id="pQty" type="number" class="form-control mb-2" placeholder="Cantidad">

<select id="pCategory" class="form-control mb-2"></select>

<input type="file" id="pImg" class="form-control">

</div>

<div class="modal-footer">

<button id="saveProduct" class="btn btn-primary">
Guardar
</button>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

const firebaseConfig={
apiKey:"AIzaSyCOlWzZG-q_dEVOXcl_VUeJSqyOLjgUspE",
authDomain:"inventario-checkmotor.firebaseapp.com",
projectId:"inventario-checkmotor",
storageBucket:"inventario-checkmotor.appspot.com",
messagingSenderId:"477154912469",
appId:"1:477154912469:web:41eb97c2f847946dd89a5c"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()
const auth=firebase.auth()
const storage=firebase.storage()

let currentUser
let productsRef
let categoriesRef

let products=[]
let categories=[]

let editing=null


auth.onAuthStateChanged(user=>{

if(user){

currentUser=user

productsRef=db.collection("users").doc(user.uid).collection("products")

categoriesRef=db.collection("users").doc(user.uid).collection("categories")

loginSection.classList.add("hidden")

appSection.classList.remove("hidden")

userEmail.innerText=user.email

listenProducts()

listenCategories()

}else{

loginSection.classList.remove("hidden")

appSection.classList.add("hidden")

}

})


loginForm.onsubmit=async e=>{

e.preventDefault()

await auth.signInWithEmailAndPassword(email.value,password.value)

}


registerBtn.onclick=async()=>{

await auth.createUserWithEmailAndPassword(email.value,password.value)

}


logoutBtn.onclick=()=>auth.signOut()


function listenProducts(){

productsRef.onSnapshot(snap=>{

products=[]

snap.forEach(doc=>{

products.push({id:doc.id,...doc.data()})

})

render()

})

}


function listenCategories(){

categoriesRef.onSnapshot(snap=>{

categories=[]

filterCategory.innerHTML='<option value="all">Todas categorías</option>'

pCategory.innerHTML=""

snap.forEach(doc=>{

let c=doc.data()

categories.push(c.name)

filterCategory.innerHTML+=`<option>${c.name}</option>`

pCategory.innerHTML+=`<option>${c.name}</option>`

})

})

}


function render(){

let list=products

let s=search.value.toLowerCase()

if(s){

list=list.filter(p=>p.name.toLowerCase().includes(s))

}

let cat=filterCategory.value

if(cat!="all"){

list=list.filter(p=>p.category==cat)

}

let order=sort.value

if(order=="name") list.sort((a,b)=>a.name.localeCompare(b.name))
if(order=="qty") list.sort((a,b)=>a.quantity-b.quantity)
if(order=="price") list.sort((a,b)=>a.price-b.price)

productList.innerHTML=""

list.forEach(p=>{

let low=p.quantity<=3?"low":""

productList.innerHTML+=`

<div class="col-md-4 mb-3">

<div class="card ${low}">

<img src="${p.image||'https://via.placeholder.com/300'}" class="product-img">

<div class="card-body">

<h5>${p.name}</h5>

Precio $${p.price}<br>

Cantidad ${p.quantity}<br>

Categoría ${p.category}

</div>

<div class="card-footer">

<button class="btn btn-warning btn-sm" onclick="edit('${p.id}')">Editar</button>

<button class="btn btn-danger btn-sm" onclick="del('${p.id}')">Eliminar</button>

</div>

</div>

</div>

`

})

updateStats()

}


function updateStats(){

let units=0
let value=0

products.forEach(p=>{

units+=p.quantity
value+=p.price*p.quantity

})

statProducts.innerText=products.length
statUnits.innerText=units
statValue.innerText="$"+value.toFixed(2)

}


async function addCategory(){

if(!newCategory.value) return

await categoriesRef.add({name:newCategory.value})

newCategory.value=""

}


saveProduct.onclick=async()=>{

let name=pName.value
let price=parseFloat(pPrice.value)
let qty=parseInt(pQty.value)
let cat=pCategory.value

let img=""

if(pImg.files.length){

let file=pImg.files[0]

let ref=storage.ref("products/"+Date.now())

await ref.put(file)

img=await ref.getDownloadURL()

}

if(editing){

await productsRef.doc(editing).update({

name:name,
price:price,
quantity:qty,
category:cat,
image:img

})

editing=null

}else{

await productsRef.add({

name:name,
price:price,
quantity:qty,
category:cat,
image:img

})

}

bootstrap.Modal.getInstance(productModal).hide()

}


function edit(id){

let p=products.find(x=>x.id==id)

pName.value=p.name
pPrice.value=p.price
pQty.value=p.quantity
pCategory.value=p.category

editing=id

new bootstrap.Modal(productModal).show()

}


async function del(id){

if(confirm("Eliminar producto?")){

await productsRef.doc(id).delete()

}

}


search.oninput=render
filterCategory.onchange=render
sort.onchange=render


function exportExcel(){

let csv="Nombre,Precio,Cantidad,Categoria\n"

products.forEach(p=>{

csv+=`${p.name},${p.price},${p.quantity},${p.category}\n`

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="inventario.csv"

a.click()

}

</script>

</body>
</html>
